<!-- CloudBase SDK 由模块自动加载（支持多 CDN 降级：unpkg → jsdelivr → 本地 /sdk/cloudbase.js） -->
<body>
  <div id="root"></div>
  <noscript>
    <div style="text-align: center; padding: 50px; font-family: 'Inter', sans-serif;">
      <h1 style="color: #2563eb; margin-bottom: 20px;">请启用JavaScript</h1>
      <p style="font-size: 18px; color: #4b5563; margin-bottom: 30px;">
        无人机培训系统需要JavaScript才能正常运行。请启用浏览器中的JavaScript功能。
      </p>
      <div style="max-width: 600px; margin: 0 auto; padding: 30px; background: #f3f4f6; border-radius: 12px;">
        <h2 style="color: #374151; margin-bottom: 15px;">如何启用JavaScript</h2>
        <ul style="text-align: left; color: #6b7280; line-height: 1.6;">
          <li><strong>Chrome:</strong> 设置 → 隐私和安全 → 网站设置 → JavaScript → 允许所有网站使用 JavaScript</li>
          <li><strong>Safari:</strong> 偏好设置 → 安全性 → 启用 JavaScript</li>
          <li><strong>Firefox:</strong> 设置 → 隐私和安全 → 权限 → 允许脚本</li>
          <li><strong>Edge:</strong> 设置 → Cookie 和网站权限 → JavaScript → 允许所有网站使用 JavaScript</li>
        </ul>
      </div>
      <div style="margin-top: 40px;">
        <a href="https://rcwljy-5ghmq2ex26764978-1318564729.tcloudbaseapp.com/connection-test.html" 
           style="display: inline-block; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">
          访问连接测试页面
        </a>
      </div>
    </div>
  </noscript>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- 加载状态样式 -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* 加载动画 */
    .app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #e2e8f0;
      border-top: 5px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 30px;
    }
    
    .loading-text {
      font-size: 18px;
      color: #4b5563;
      font-weight: 500;
      margin-bottom: 10px;
    }
    
    .loading-subtext {
      font-size: 14px;
      color: #6b7280;
      max-width: 300px;
      text-align: center;
      line-height: 1.5;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* 确保加载状态在脚本加载前显示 */
    #root:empty::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      z-index: 1000;
    }
    
    #root:empty::after {
      content: '正在加载无人机培训系统...';
      position: fixed;
      top: calc(50% + 60px);
      left: 0;
      right: 0;
      text-align: center;
      font-size: 16px;
      color: #4b5563;
      font-weight: 500;
      z-index: 1000;
    }
    
    #root:empty::before {
      content: '';
      position: fixed;
      top: calc(50% - 40px);
      left: calc(50% - 25px);
      width: 50px;
      height: 50px;
      border: 5px solid #e2e8f0;
      border-top: 5px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 1000;
    }
  </style>
</body>
