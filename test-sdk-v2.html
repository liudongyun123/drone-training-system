<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDK 测试 - 无人机培训系统</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    h1 { color: #333; }
    .result { margin: 20px 0; padding: 15px; background: #f9fafb; border-radius: 6px; }
    .success { color: #059669; }
    .error { color: #dc2626; }
    .info { color: #2563eb; }
    pre { background: #1f2937; color: #e5e7eb; padding: 15px; border-radius: 6px; overflow-x: auto; max-height: 300px; }
    button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
    button:hover { background: #1d4ed8; }
    input, select { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; margin: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CloudBase SDK 测试 (修复版)</h1>
    
    <div class="result">
      <h3>页面信息</h3>
      <p>环境ID: <strong>rcwljy-5ghmq2ex26764978</strong></p>
      <p>SDK CDN: <strong>static.cloudbase.net</strong></p>
      <p>SDK 加载状态: <strong id="sdkStatus">检测中...</strong></p>
      <p>登录状态: <strong id="authStatus">检测中...</strong></p>
    </div>
    
    <div class="result">
      <h3>SDK 初始化 + 匿名登录</h3>
      <div id="initResult">
        <button onclick="initWithAuth()">初始化并匿名登录</button>
      </div>
    </div>
    
    <div class="result">
      <h3>云函数调用测试</h3>
      <select id="fnName">
        <option value="api-course">api-course</option>
        <option value="api-admin">api-admin</option>
      </select>
      <br><br>
      <input type="text" id="fnData" value='{"action":"list","page":1,"pageSize":2}' style="width:400px">
      <br><br>
      <button onclick="testCallFunction()">调用云函数</button>
      <div id="fnResult"></div>
    </div>
    
    <div class="result">
      <h3>控制台输出</h3>
      <pre id="console" style="max-height:400px">等待测试...</pre>
    </div>
  </div>

  <!-- CloudBase SDK 全量引入 -->
  <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
  
  <script>
    const ENV_ID = 'rcwljy-5ghmq2ex26764978';
    let app = null;
    let auth = null;
    
    function log(msg, type) {
      const consoleEl = document.getElementById('console');
      const time = new Date().toLocaleTimeString();
      const colorClass = type === 'success' ? 'success' : type === 'error' ? 'error' : 'info';
      consoleEl.innerHTML += '<span class="' + colorClass + '">[' + time + '] ' + msg + '</span>\n';
      consoleEl.scrollTop = consoleEl.scrollHeight;
      console.log(msg);
    }
    
    function checkSDK() {
      const status = document.getElementById('sdkStatus');
      if (typeof cloudbase !== 'undefined') {
        status.innerHTML = '<span class="success">已加载!</span>';
        log('SDK 加载成功', 'success');
        return true;
      } else {
        status.innerHTML = '<span class="error">未找到 cloudbase</span>';
        log('SDK 加载失败', 'error');
        return false;
      }
    }
    
    async function initWithAuth() {
      const result = document.getElementById('initResult');
      const authStatus = document.getElementById('authStatus');
      result.innerHTML = '正在初始化...';
      log('开始初始化 SDK...');
      
      try {
        // 1. 初始化 SDK
        app = cloudbase.init({
          env: ENV_ID
        });
        log('SDK 初始化成功', 'success');
        
        // 2. 获取 auth 实例
        auth = app.auth({ persistence: 'local' });
        
        // 3. 检查当前登录状态
        const loginState = await auth.getLoginState();
        if (loginState) {
          log('已有登录状态: ' + JSON.stringify(loginState), 'success');
          authStatus.innerHTML = '<span class="success">已登录</span>';
        } else {
          log('未登录，开始匿名登录...', 'info');
          authStatus.innerHTML = '<span class="info">匿名登录中...</span>';
          
          // 4. 匿名登录
          try {
            await auth.signInAnonymously();
            log('匿名登录成功!', 'success');
            authStatus.innerHTML = '<span class="success">匿名登录成功</span>';
          } catch (signInError) {
            log('匿名登录失败: ' + signInError.message, 'error');
            authStatus.innerHTML = '<span class="error">登录失败</span>';
          }
        }
        
        result.innerHTML = '<span class="success">初始化完成!</span> <button onclick="initWithAuth()">重新初始化</button>';
        
      } catch (e) {
        result.innerHTML = '<span class="error">初始化失败: ' + e.message + '</span>';
        log('初始化失败: ' + e.message, 'error');
      }
    }
    
    async function testCallFunction() {
      if (!app) {
        document.getElementById('fnResult').innerHTML = '<span class="error">请先初始化 SDK!</span>';
        return;
      }
      
      const fnName = document.getElementById('fnName').value;
      const fnDataStr = document.getElementById('fnData').value;
      let fnData;
      
      try {
        fnData = JSON.parse(fnDataStr);
      } catch (e) {
        document.getElementById('fnResult').innerHTML = '<span class="error">JSON 格式错误</span>';
        return;
      }
      
      const resultDiv = document.getElementById('fnResult');
      resultDiv.innerHTML = '正在调用...';
      log('调用云函数: ' + fnName);
      
      try {
        const res = await app.callFunction({
          name: fnName,
          data: fnData
        });
        
        log('收到响应');
        
        if (res.result) {
          if (res.result.success !== false) {
            resultDiv.innerHTML = '<span class="success">调用成功!</span><pre>' + JSON.stringify(res.result, null, 2).substring(0, 800) + '</pre>';
            log('调用成功', 'success');
          } else {
            resultDiv.innerHTML = '<span class="info">调用完成</span><pre>' + JSON.stringify(res.result, null, 2) + '</pre>';
          }
        } else {
          resultDiv.innerHTML = '<pre>' + JSON.stringify(res, null, 2) + '</pre>';
        }
      } catch (e) {
        resultDiv.innerHTML = '<span class="error">调用失败: ' + e.message + '</span>';
        log('调用失败: ' + e.message, 'error');
      }
    }
    
    // 页面加载时检查 SDK
    window.onload = function() {
      setTimeout(checkSDK, 1000);
    };
  </script>
</body>
</html>
