<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据库诊断 - 无人机培训系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #1976d2; margin-bottom: 20px; font-size: 24px; }
    .test-item { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #eee; }
    .test-item:last-child { border-bottom: none; }
    .status { width: 32px; height: 32px; border-radius: 50%; margin-right: 16px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .pending { background: #ffa726; color: white; }
    .success { background: #4caf50; color: white; }
    .error { background: #f44336; color: white; }
    .info { flex: 1; }
    .info h3 { font-size: 16px; margin-bottom: 4px; }
    .info p { font-size: 14px; color: #666; }
    .details { background: #f5f5f5; padding: 12px; border-radius: 8px; margin-top: 8px; font-family: monospace; font-size: 12px; word-break: break-all; }
    button { background: #1976d2; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 20px; }
    button:hover { background: #1565c0; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .summary { background: #e3f2fd; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
    .summary h2 { color: #1976d2; margin-bottom: 8px; }
    .env-info { background: #fff3e0; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 数据库连通性诊断</h1>
    
    <div class="summary" id="summary">
      <h2>点击下方按钮开始测试</h2>
      <p>系统将依次检测：环境配置 → SDK初始化 → 匿名登录 → 数据库连接 → 数据读取</p>
    </div>

    <div id="tests">
      <div class="test-item">
        <div class="status pending" id="status-1">1</div>
        <div class="info">
          <h3>环境配置检测</h3>
          <p>检查环境ID和密钥是否正确配置</p>
          <div class="details" id="detail-1">等待测试...</div>
        </div>
      </div>

      <div class="test-item">
        <div class="status pending" id="status-2">2</div>
        <div class="info">
          <h3>CloudBase SDK 初始化</h3>
          <p>验证云开发 SDK 是否正常加载</p>
          <div class="details" id="detail-2">等待测试...</div>
        </div>
      </div>

      <div class="test-item">
        <div class="status pending" id="status-3">3</div>
        <div class="info">
          <h3>匿名登录</h3>
          <p>测试用户认证功能</p>
          <div class="details" id="detail-3">等待测试...</div>
        </div>
      </div>

      <div class="test-item">
        <div class="status pending" id="status-4">4</div>
        <div class="info">
          <h3>数据库连接</h3>
          <p>测试 NoSQL 数据库连通性</p>
          <div class="details" id="detail-4">等待测试...</div>
        </div>
      </div>

      <div class="test-item">
        <div class="status pending" id="status-5">5</div>
        <div class="info">
          <h3>数据读取测试</h3>
          <p>尝试读取 courses 集合数据</p>
          <div class="details" id="detail-5">等待测试...</div>
        </div>
      </div>
    </div>

    <button id="startBtn" onclick="runTests()">▶ 开始诊断</button>

    <div class="env-info" id="envInfo">
      <strong>环境信息：</strong><br>
      <span id="envDisplay"></span>
    </div>
  </div>

  <script src="https://cos.clsaw.com/cloudbase-js-sdk/cloudbase-js-sdk@3.3.3/cloudbase-js-sdk@3.3.3.js"></script>
  <script>
    // 环境配置
    const ENV_ID = 'rcwljy-5ghmq2ex26764978';
    const PUBLISHABLE_KEY = 'eyJhbGciOiJSUzI1NiIsImtpZCI6IjlkMWRjMzFlLWI0ZDAtNDQ4Yi1hNzZmLWIwY2M2M2Q4MTQ5OCJ9.eyJpc3MiOiJodHRwczovL3Jjd2xqeS01Z2htcTJleDI2NzY0OTc4LmFwLXNoYW5naGFpLnRjYi1hcGkudGVuY2VudGNsb3VkYXBpLmNvbSIsInN1YiI6ImFub24iLCJhdWQiOiJyY3dsanktNWdobXEyZXgyNjc2NDk3OCIsImV4cCI6NDA3NzU5NTUxNCwiaWF0IjoxNzczOTEyMzE0LCJub25jZSI6Ik5ta1U4MXRaUTdHTnFvT2kxY3hrOHciLCJhdF9oYXNoIjoiTm1rVTgxdFpRN0dOcW9PaTFjeGs4dyIsIm5hbWUiOiJBbm9ueW1vdXMiLCJzY29wZSI6ImFub255bW91cyIsInByb2plY3RfaWQiOiJyY3dsanktNWdobXEyZXgyNjc2NDk3OCIsInVzZXJfdHlwZSI6IiIsImNsaWVudF90eXBlIjoiY2xpZW50X3VzZXIiLCJpc19zeXN0ZW1fYWRtaW4iOmZhbHNlfQ.QBOkGCaryupFFhFuxDIwDljwC5PRan_zMneIjlaa9_UJLz1ajlBumYCmaFA5IAYQ97yC5fuxmH36HjhBoegA3XY1gE_BNL0aRcD-Gwu5Tmk57IrPzXKKkXN3eSCbJmD3aLVDeHguRyUO1Qc3oSIiUVlVox77BGj7GFw9TdQzJaWnrRWSmhsPaQoiSqI7HjhdDhIpVoMBZfSpAY1kqEjUvZ8r54e6vHgGm6XmeQXFQQ9141SUAt839J45rkhrRWS28Yxt6Rlbrk7nGllYV-q_uuTzdCaBw0aUYdoRJAHoyaPyTz2rIPexk36Ox8Ai9pQpmn9RcrTpm0MXJIoQrrwNLw';

    let app = null;
    let passed = 0;
    let failed = 0;

    // 显示环境信息
    document.getElementById('envDisplay').textContent = 
      `环境ID: ${ENV_ID}\nPublishable Key: ${PUBLISHABLE_KEY.substring(0, 50)}...`;

    function updateStatus(num, status, message, details = '') {
      const statusEl = document.getElementById(`status-${num}`);
      const detailEl = document.getElementById(`detail-${num}`);
      
      statusEl.className = `status ${status}`;
      statusEl.textContent = status === 'success' ? '✓' : status === 'error' ? '✗' : num;
      detailEl.textContent = message + (details ? '\n\n' + details : '');
      
      if (status === 'success') passed++;
      if (status === 'error') failed++;
      
      updateSummary();
    }

    function updateSummary() {
      const summaryEl = document.getElementById('summary');
      if (passed + failed === 0) {
        summaryEl.innerHTML = '<h2>点击下方按钮开始测试</h2><p>系统将依次检测：环境配置 → SDK初始化 → 匿名登录 → 数据库连接 → 数据读取</p>';
      } else if (failed === 0) {
        summaryEl.innerHTML = `<h2>✅ 测试进行中...</h2><p>通过: ${passed} | 失败: ${failed}</p>`;
      } else {
        summaryEl.innerHTML = `<h2>⚠️ 发现问题</h2><p>通过: ${passed} | 失败: ${failed}</p>`;
      }
    }

    async function runTests() {
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      btn.textContent = '测试中...';
      passed = 0;
      failed = 0;
      updateSummary();

      // 测试1: 环境配置
      try {
        if (ENV_ID && !ENV_ID.includes('your-env') && PUBLISHABLE_KEY) {
          updateStatus(1, 'success', '✅ 环境配置正确', `ENV_ID: ${ENV_ID}`);
        } else {
          updateStatus(1, 'error', '❌ 环境配置不完整', '请检查 ENV_ID 和 PUBLISHABLE_KEY');
        }
      } catch (e) {
        updateStatus(1, 'error', '❌ 环境配置检测失败', e.message);
      }
      await sleep(500);

      // 测试2: SDK初始化
      try {
        app = cloudbase.init({
          env: ENV_ID,
          accessKey: PUBLISHABLE_KEY,
          auth: { persistence: 'local' }
        });
        updateStatus(2, 'success', '✅ SDK 初始化成功', `SDK Version: 3.3.3`);
      } catch (e) {
        updateStatus(2, 'error', '❌ SDK 初始化失败', e.message);
      }
      await sleep(500);

      // 测试3: 匿名登录
      try {
        const auth = app.auth();
        const result = await auth.signInAnonymously();
        updateStatus(3, 'success', '✅ 匿名登录成功', `User ID: ${result.data?.userId || 'anonymous'}`);
      } catch (e) {
        if (e.message && e.message.includes('CORS')) {
          updateStatus(3, 'error', '❌ CORS 跨域错误', '域名未在 CloudBase 安全配置中添加');
        } else if (e.code === 'ENV_ISOLATED') {
          updateStatus(3, 'error', '❌ 环境已被隔离', 'CloudBase 环境已到期，请续费');
        } else {
          updateStatus(3, 'error', '❌ 登录失败', e.message);
        }
      }
      await sleep(500);

      // 测试4: 数据库连接
      try {
        const db = app.database();
        const res = await db.collection('courses').count();
        updateStatus(4, 'success', '✅ 数据库连接成功', `courses 集合统计: ${JSON.stringify(res)}`);
      } catch (e) {
        if (e.message && e.message.includes('collection')) {
          updateStatus(4, 'success', '✅ 数据库连接成功', '集合可能不存在，但连接正常');
        } else if (e.code === 'DATABASE_PERMISSION_DENIED') {
          updateStatus(4, 'error', '❌ 权限不足', '请检查数据库安全规则');
        } else {
          updateStatus(4, 'error', '❌ 数据库连接失败', e.message);
        }
      }
      await sleep(500);

      // 测试5: 数据读取
      try {
        const db = app.database();
        const res = await db.collection('courses').limit(5).get();
        updateStatus(5, 'success', '✅ 数据读取成功', `读取到 ${res.data?.length || 0} 条记录`);
      } catch (e) {
        updateStatus(5, 'error', '❌ 数据读取失败', e.message);
      }

      // 完成
      updateSummary();
      btn.disabled = false;
      btn.textContent = '▶ 重新测试';
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
