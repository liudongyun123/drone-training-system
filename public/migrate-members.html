<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据迁移工具 - Members</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 40px 20px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; color: #00d9ff; }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin: 10px 0;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00d9ff, #0099ff);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,217,255,0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    .log {
      background: #0d1117;
      border-radius: 10px;
      padding: 20px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.8;
      margin-top: 20px;
    }
    .log-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0; }
    .log-success { color: #4ade80; }
    .log-error { color: #f87171; }
    .log-info { color: #60a5fa; }
    .log-warn { color: #fbbf24; }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .stat-value { font-size: 32px; font-weight: bold; color: #00d9ff; }
    .stat-label { color: #9ca3af; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 数据迁移工具</h1>
    <p style="text-align:center;color:#9ca3af;margin-bottom:30px;">
      将 user_profiles 迁移到新的 members 集合
    </p>
    
    <div class="card">
      <h3 style="margin-bottom:15px;">📊 当前数据状态</h3>
      <div class="stats">
        <div class="stat-box">
          <div class="stat-value" id="profilesCount">-</div>
          <div class="stat-label">user_profiles</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="membersCount">-</div>
          <div class="stat-label">members</div>
        </div>
      </div>
      <button class="btn btn-secondary" onclick="refreshStats()">🔄 刷新数据</button>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom:15px;">🚀 开始迁移</h3>
      <p style="color:#9ca3af;margin-bottom:20px;">
        点击下方按钮开始迁移。迁移过程会自动跳过已存在的记录。
      </p>
      <button class="btn btn-primary" id="migrateBtn" onclick="startMigration()">
        ▶️ 开始迁移数据
      </button>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom:15px;">📝 迁移日志</h3>
      <div class="log" id="logArea">
        <div class="log-item log-info">等待开始迁移...</div>
      </div>
    </div>
  </div>

  <script src="https://imgcache.gzcdn.com/miniapp/cloudbase-js-sdk/2.10.0/cloudbase-js-sdk.min.js"></script>
  <script>
    // 初始化 CloudBase
    const app = cloudbase.init({
      env: 'rcwljy-5ghmq2ex26764978-1318564729'
    })
    
    const db = app.database()
    const membersCollection = db.collection('members')
    const profilesCollection = db.collection('user_profiles')
    
    function log(message, type = 'info') {
      const area = document.getElementById('logArea')
      const item = document.createElement('div')
      item.className = `log-item log-${type}`
      item.textContent = `${new Date().toLocaleTimeString()} ${message}`
      area.appendChild(item)
      area.scrollTop = area.scrollHeight
    }
    
    async function refreshStats() {
      try {
        const profilesRes = await profilesCollection.get()
        const membersRes = await membersCollection.get()
        document.getElementById('profilesCount').textContent = profilesRes.data?.length || 0
        document.getElementById('membersCount').textContent = membersRes.data?.length || 0
        log('数据统计已刷新', 'info')
      } catch (e) {
        log('刷新统计失败: ' + e.message, 'error')
      }
    }
    
    async function startMigration() {
      const btn = document.getElementById('migrateBtn')
      btn.disabled = true
      btn.textContent = '迁移中...'
      
      log('🚀 开始迁移数据...', 'info')
      
      try {
        // 获取所有 user_profiles
        log('📋 正在获取 user_profiles 数据...', 'info')
        const profilesRes = await profilesCollection.get()
        const profiles = profilesRes.data || []
        log(`   找到 ${profiles.length} 条用户档案`, 'info')
        
        if (profiles.length === 0) {
          log('⚠️  没有需要迁移的数据', 'warn')
          btn.disabled = false
          btn.textContent = '▶️ 开始迁移数据'
          return
        }
        
        let successCount = 0
        let skipCount = 0
        let errorCount = 0
        
        for (let i = 0; i < profiles.length; i++) {
          const profile = profiles[i]
          const userId = profile.userId || profile._id
          
          try {
            // 检查是否已存在
            const existing = await membersCollection.doc(userId).get()
            
            if (existing.data) {
              log(`⏭️  跳过已存在: ${profile.name} (${userId})`, 'warn')
              skipCount++
              continue
            }
            
            // 创建 members 记录
            const member = {
              _id: userId,
              name: profile.name || '未知用户',
              phone: profile.phone,
              email: profile.email,
              avatar: profile.avatar,
              type: 'student',
              role: 'student',
              profile: {
                idCard: profile.idCard,
                gender: profile.gender,
                address: profile.address,
                education: profile.education,
                emergencyContact: profile.emergencyContact,
                emergencyPhone: profile.emergencyPhone,
                level: profile.level,
                totalHours: profile.totalHours || 0
              },
              stats: {
                totalHours: profile.totalHours || 0,
                completedCourses: 0,
                examAttempts: 0,
                avgScore: 0,
                totalOrders: 0,
                totalSpent: 0
              },
              enrolledCourses: [],
              completedCourses: [],
              status: profile.status || 'active',
              createdAt: profile.joinDate || profile.createdAt || new Date().toISOString(),
              updatedAt: new Date().toISOString(),
              firstPurchaseAt: profile.joinDate
            }
            
            await membersCollection.add(member)
            log(`✅ 迁移: ${profile.name} (${userId})`, 'success')
            successCount++
            
          } catch (err) {
            log(`❌ 失败: ${profile.name} - ${err.message}`, 'error')
            errorCount++
          }
          
          // 进度更新
          if ((i + 1) % 5 === 0 || i === profiles.length - 1) {
            log(`📊 进度: ${i + 1}/${profiles.length}`, 'info')
          }
        }
        
        log('', 'info')
        log('═══════════════════════════════', 'info')
        log('📊 迁移完成！', 'info')
        log(`   成功: ${successCount}`, 'success')
        log(`   跳过: ${skipCount}`, 'warn')
        log(`   失败: ${errorCount}`, 'error')
        log('═══════════════════════════════', 'info')
        
        // 刷新统计
        await refreshStats()
        
      } catch (e) {
        log('❌ 迁移过程出错: ' + e.message, 'error')
      }
      
      btn.disabled = false
      btn.textContent = '▶️ 重新迁移'
    }
    
    // 页面加载时自动刷新统计
    refreshStats()
  </script>
</body>
</html>
