<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>权限系统诊断 - API 模式</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { color: #fff; margin-bottom: 20px; font-size: 1.8rem; }
    h1 span { font-size: 0.8rem; color: #64748b; font-weight: normal; }
    .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h2 { color: #38bdf8; margin-bottom: 15px; font-size: 1.2rem; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    .btn { background: #3b82f6; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-right: 10px; margin-bottom: 10px; transition: all 0.2s; }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #475569; cursor: not-allowed; }
    .btn.success { background: #22c55e; }
    .btn.warning { background: #f59e0b; }
    .log { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 15px; max-height: 300px; overflow-y: auto; font-family: 'Monaco', monospace; font-size: 13px; line-height: 1.6; }
    .log-entry { margin-bottom: 5px; }
    .log-entry.info { color: #38bdf8; }
    .log-entry.success { color: #22c55e; }
    .log-entry.error { color: #ef4444; }
    .log-entry.warning { color: #f59e0b; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: #334155; border-radius: 8px; padding: 15px; text-align: center; }
    .stat-card .value { font-size: 2rem; font-weight: bold; color: #38bdf8; }
    .stat-card .label { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }
    .status { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 1.1rem; }
    .status.error { background: #ef444433; color: #ef4444; border: 1px solid #ef4444; }
    .status.success { background: #22c55e33; color: #22c55e; border: 1px solid #22c55e; }
    .status.info { background: #3b82f633; color: #38bdf8; border: 1px solid #38bdf8; }
    .status.loading { background: #f59e0b33; color: #f59e0b; border: 1px solid #f59e0b; }
    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result { background: #0f172a; border-radius: 8px; padding: 15px; margin-top: 15px; max-height: 400px; overflow-y: auto; }
    .result pre { font-family: monospace; font-size: 12px; white-space: pre-wrap; color: #94a3b8; }
    .empty { color: #64748b; text-align: center; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #334155; }
    th { color: #38bdf8; font-weight: 600; }
    td { color: #cbd5e1; }
    .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
    .tag.active { background: #22c55e33; color: #22c55e; }
    .tag.pending { background: #f59e0b33; color: #f59e0b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>权限系统诊断工具 <span>API 模式（不依赖 SDK）</span></h1>
    
    <div id="status" class="status info">准备就绪</div>
    
    <div class="stats">
      <div class="stat-card">
        <div class="value" id="statCP">-</div>
        <div class="label">课程权限</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statCM">-</div>
        <div class="label">班级成员</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statCourses">-</div>
        <div class="label">课程</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statClasses">-</div>
        <div class="label">班级</div>
      </div>
    </div>
    
    <div class="card">
      <h2>操作</h2>
      <button class="btn" id="btnRefresh" onclick="refreshStats()">刷新统计</button>
      <button class="btn success" id="btnGenCP" onclick="generateCP()">生成课程权限测试数据</button>
      <button class="btn success" id="btnGenCM" onclick="generateCM()">生成班级成员测试数据</button>
      <button class="btn warning" id="btnGenAll" onclick="generateAll()">一键生成全部</button>
    </div>
    
    <div class="card">
      <h2>操作日志</h2>
      <div class="log" id="log"><div class="log-entry info">[系统] 等待操作...</div></div>
    </div>
    
    <div class="card">
      <h2>数据预览</h2>
      <div id="previewCP" class="empty">暂无课程权限数据</div>
      <div id="previewCM" class="empty">暂无班级成员数据</div>
    </div>
    
    <div class="card">
      <h2>原始响应</h2>
      <div class="result"><pre id="result">等待操作...</pre></div>
    </div>
  </div>

  <script>
    const ENV_ID = 'rcwljy-5ghmq2ex26764978';
    
    // 使用云函数 HTTP 触发器 URL
    // 注意：需要先配置 admin-http 云函数的 HTTP 触发器
    const API_URL = `https://${ENV_ID}.service.tcloudbase.com/admin-http`;
    
    function log(msg, type = 'info') {
      const el = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      el.innerHTML += `<div class="log-entry ${type}">[${time}] ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }
    
    function showStatus(msg, type = 'info') {
      const el = document.getElementById('status');
      el.className = `status ${type}`;
      el.textContent = msg;
    }
    
    function showResult(data) {
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    }
    
    function setLoading(btnId, loading, text) {
      const btn = document.getElementById(btnId);
      if (btn) {
        btn.disabled = loading;
        btn.innerHTML = loading ? '<span class="loading"></span>' + (text || '加载中...') : (text || btn.textContent);
      }
    }
    
    // 调用云函数 HTTP API
    async function callFunction(action, collection, data = {}) {
      log(`调用云函数: ${action}/${collection}`);
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, collection, data })
        });
        
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        }
        
        const json = await res.json();
        log(`云函数响应: ${json.code === 0 ? '成功' : '失败'}`, json.code === 0 ? 'success' : 'warning');
        return json;
      } catch (e) {
        log(`请求失败: ${e.message}`, 'error');
        return { code: -1, message: e.message };
      }
    }
    
    async function refreshStats() {
      setLoading('btnRefresh', true, '刷新中...');
      log('刷新统计数据...');
      showStatus('刷新中...', 'loading');
      
      try {
        const [cp, cm, courses, classes] = await Promise.all([
          callFunction('count', 'course_permissions', {}),
          callFunction('count', 'class_members', {}),
          callFunction('count', 'courses', {}),
          callFunction('count', 'classes', {})
        ]);
        
        document.getElementById('statCP').textContent = cp.data ?? '?';
        document.getElementById('statCM').textContent = cm.data ?? '?';
        document.getElementById('statCourses').textContent = courses.data ?? '?';
        document.getElementById('statClasses').textContent = classes.data ?? '?';
        
        // 加载预览
        await loadPreview();
        
        showStatus('✓ 统计刷新完成', 'success');
      } catch (e) {
        log('刷新失败: ' + e.message, 'error');
        showStatus('刷新失败', 'error');
      } finally {
        setLoading('btnRefresh', false, '刷新统计');
      }
    }
    
    async function loadPreview() {
      try {
        // 加载课程权限预览
        const cpRes = await callFunction('list', 'course_permissions', { pageSize: 5 });
        const previewCP = document.getElementById('previewCP');
        if (cpRes.data && cpRes.data.length > 0) {
          let html = `<table><thead><tr><th>学员</th><th>课程</th><th>来源</th><th>状态</th></tr></thead><tbody>`;
          cpRes.data.slice(0, 5).forEach(item => {
            html += `<tr>
              <td>${item.userName || '-'}</td>
              <td>${item.courseName || '-'}</td>
              <td>${item.source || '-'}</td>
              <td><span class="tag ${item.status === 'active' ? 'active' : 'pending'}">${item.status || '-'}</span></td>
            </tr>`;
          });
          html += '</tbody></table>';
          previewCP.innerHTML = html;
        } else {
          previewCP.innerHTML = '<div class="empty">暂无数据，点击上方按钮生成</div>';
        }
        
        // 加载班级成员预览
        const cmRes = await callFunction('list', 'class_members', { pageSize: 5 });
        const previewCM = document.getElementById('previewCM');
        if (cmRes.data && cmRes.data.length > 0) {
          let html = `<table><thead><tr><th>学员</th><th>班级</th><th>来源</th><th>状态</th></tr></thead><tbody>`;
          cmRes.data.slice(0, 5).forEach(item => {
            html += `<tr>
              <td>${item.userName || '-'}</td>
              <td>${item.className || '-'}</td>
              <td>${item.source || '-'}</td>
              <td><span class="tag ${item.status === 'enrolled' ? 'active' : 'pending'}">${item.status || '-'}</span></td>
            </tr>`;
          });
          html += '</tbody></table>';
          previewCM.innerHTML = html;
        } else {
          previewCM.innerHTML = '<div class="empty">暂无数据，点击上方按钮生成</div>';
        }
      } catch (e) {
        log('加载预览失败: ' + e.message, 'error');
      }
    }
    
    async function generateCP() {
      setLoading('btnGenCP', true, '生成中...');
      const res = await callFunction('generateTestData', 'course_permissions', { count: 10 });
      showResult(res);
      setLoading('btnGenCP', false, '生成课程权限测试数据');
      
      if (res.code === 0) {
        showStatus(`✓ 成功生成 ${res.data?.inserted || 10} 条课程权限`, 'success');
        await refreshStats();
      } else {
        showStatus('生成失败', 'error');
      }
    }
    
    async function generateCM() {
      setLoading('btnGenCM', true, '生成中...');
      const res = await callFunction('generateTestData', 'class_members', { count: 10 });
      showResult(res);
      setLoading('btnGenCM', false, '生成班级成员测试数据');
      
      if (res.code === 0) {
        showStatus(`✓ 成功生成 ${res.data?.inserted || 10} 条班级成员`, 'success');
        await refreshStats();
      } else {
        showStatus('生成失败', 'error');
      }
    }
    
    async function generateAll() {
      setLoading('btnGenAll', true, '生成全部...');
      await generateCP();
      await new Promise(r => setTimeout(r, 500));
      await generateCM();
      setLoading('btnGenAll', false, '一键生成全部');
      showStatus('✓ 全部生成完成', 'success');
    }
    
    // 初始化
    window.onload = () => {
      log('诊断工具已加载（API 模式）', 'success');
      log('点击"刷新统计"开始测试连接', 'info');
      showStatus('准备就绪，点击"刷新统计"开始', 'info');
    };
  </script>
</body>
</html>
