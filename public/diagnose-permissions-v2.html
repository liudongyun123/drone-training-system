<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>权限系统诊断 v2 - 无人机培训系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #fff; margin-bottom: 20px; font-size: 1.8rem; }
    h1 span { font-size: 0.8rem; color: #64748b; font-weight: normal; }
    .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h2 { color: #38bdf8; margin-bottom: 15px; font-size: 1.2rem; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    .btn { background: #3b82f6; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-right: 10px; margin-bottom: 10px; transition: all 0.2s; }
    .btn:hover { background: #2563eb; transform: translateY(-1px); }
    .btn:disabled { background: #475569; cursor: not-allowed; transform: none; }
    .btn.success { background: #22c55e; }
    .btn.warning { background: #f59e0b; }
    .btn.danger { background: #ef4444; }
    .log { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 15px; max-height: 300px; overflow-y: auto; font-family: 'Monaco', 'Menlo', monospace; font-size: 13px; line-height: 1.6; }
    .log-entry { margin-bottom: 5px; }
    .log-entry.info { color: #38bdf8; }
    .log-entry.success { color: #22c55e; }
    .log-entry.error { color: #ef4444; }
    .log-entry.warning { color: #f59e0b; }
    .log-entry.debug { color: #94a3b8; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: #334155; border-radius: 8px; padding: 15px; text-align: center; }
    .stat-card .value { font-size: 2rem; font-weight: bold; color: #38bdf8; }
    .stat-card .label { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }
    .stat-card.urgent .value { color: #f59e0b; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #334155; }
    th { color: #38bdf8; font-weight: 600; }
    td { color: #cbd5e1; }
    tr:hover { background: #33415550; }
    .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
    .tag.active { background: #22c55e33; color: #22c55e; }
    .tag.pending { background: #f59e0b33; color: #f59e0b; }
    .tag.expired { background: #ef444433; color: #ef4444; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #38bdf8; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: #ef4444; color: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .success-box { background: #22c55e; color: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .info-box { background: #3b82f6; color: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    .section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
    .section-title h3 { color: #fff; font-size: 1rem; }
    .badge { background: #3b82f6; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 10px; }
    .empty { color: #64748b; text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>权限系统诊断工具 <span>v2 - 云函数代理模式</span></h1>
    
    <div id="statusBox" class="info-box">正在连接服务器...</div>
    
    <!-- 统计卡片 -->
    <div class="stats">
      <div class="stat-card">
        <div class="value" id="statCP">-</div>
        <div class="label">课程权限</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statCM">-</div>
        <div class="label">班级成员</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statCourses">-</div>
        <div class="label">课程总数</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statClasses">-</div>
        <div class="label">班级总数</div>
      </div>
    </div>
    
    <!-- 操作按钮 -->
    <div class="card">
      <h2>数据操作</h2>
      <button class="btn" id="btnRefresh" onclick="refreshStats()">刷新统计</button>
      <button class="btn success" id="btnGenCP" onclick="generateCoursePermissions()">生成课程权限测试数据 (10条)</button>
      <button class="btn success" id="btnGenCM" onclick="generateClassMembers()">生成班级成员测试数据 (10条)</button>
      <button class="btn warning" id="btnGenAll" onclick="generateAll()">一键生成全部测试数据</button>
    </div>
    
    <!-- 日志 -->
    <div class="card">
      <h2>操作日志</h2>
      <div class="log" id="logContainer">
        <div class="log-entry info">[系统] 诊断工具已就绪</div>
      </div>
    </div>
    
    <!-- 数据预览 -->
    <div class="grid-2">
      <div class="card">
        <div class="section-title">
          <h3>课程权限预览 <span class="badge" id="cpCount">0</span></h3>
        </div>
        <div id="cpTable">
          <div class="empty">暂无数据</div>
        </div>
      </div>
      
      <div class="card">
        <div class="section-title">
          <h3>班级成员预览 <span class="badge" id="cmCount">0</span></h3>
        </div>
        <div id="cmTable">
          <div class="empty">暂无数据</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 配置
    const ENV_ID = 'rcwljy-5ghmq2ex26764978';
    const FUNCTION_NAME = 'admin';
    
    // 状态
    let isLoading = false;
    
    // 日志
    function log(msg, type = 'info') {
      const container = document.getElementById('logContainer');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${time}] ${msg}`;
      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;
      console.log(`[${type.toUpperCase()}] ${msg}`);
    }
    
    // 显示状态
    function showStatus(msg, type = 'info') {
      const box = document.getElementById('statusBox');
      box.className = type === 'error' ? 'error-box' : type === 'success' ? 'success-box' : 'info-box';
      box.textContent = msg;
    }
    
    // 调用云函数
    async function callFunction(action, collection, data = {}) {
      try {
        log(`调用云函数: ${action}/${collection}`);
        
        const res = await wx.cloud.callContainer({
          config: { env: ENV_ID },
          path: `/api/admin`,
          method: 'POST',
          header: { 'Content-Type': 'application/json' },
          data: { action, collection, data }
        });
        
        return res.data;
      } catch (e) {
        log(`云函数调用失败: ${e.message}`, 'error');
        throw e;
      }
    }
    
    // 初始化
    async function init() {
      log('开始初始化...');
      
      try {
        // 检查云函数是否可用
        const testRes = await callFunction('test', 'test');
        log('云函数连接成功', 'success');
        showStatus('✓ 服务器连接正常', 'success');
        
        // 加载统计数据
        await refreshStats();
        
      } catch (e) {
        log('初始化失败: ' + e.message, 'error');
        showStatus('✗ 服务器连接失败: ' + e.message, 'error');
      }
    }
    
    // 刷新统计
    async function refreshStats() {
      if (isLoading) return;
      isLoading = true;
      
      try {
        log('正在刷新统计数据...');
        
        // 获取课程权限数
        try {
          const cpRes = await callFunction('list', 'course_permissions', { pageSize: 1 });
          document.getElementById('statCP').textContent = cpRes?.total || 0;
          document.getElementById('cpCount').textContent = cpRes?.total || 0;
        } catch (e) { document.getElementById('statCP').textContent = '?'; }
        
        // 获取班级成员数
        try {
          const cmRes = await callFunction('list', 'class_members', { pageSize: 1 });
          document.getElementById('statCM').textContent = cmRes?.total || 0;
          document.getElementById('cmCount').textContent = cmRes?.total || 0;
        } catch (e) { document.getElementById('statCM').textContent = '?'; }
        
        // 获取课程数
        try {
          const coursesRes = await callFunction('list', 'courses', { pageSize: 1 });
          document.getElementById('statCourses').textContent = coursesRes?.total || 0;
        } catch (e) { document.getElementById('statCourses').textContent = '?'; }
        
        // 获取班级数
        try {
          const classesRes = await callFunction('list', 'classes', { pageSize: 1 });
          document.getElementById('statClasses').textContent = classesRes?.total || 0;
        } catch (e) { document.getElementById('statClasses').textContent = '?'; }
        
        log('统计数据刷新完成', 'success');
        
        // 加载数据预览
        await loadPreview();
        
      } catch (e) {
        log('刷新失败: ' + e.message, 'error');
      } finally {
        isLoading = false;
      }
    }
    
    // 加载数据预览
    async function loadPreview() {
      try {
        // 加载课程权限
        const cpRes = await callFunction('list', 'course_permissions', { pageSize: 5 });
        const cpTable = document.getElementById('cpTable');
        if (cpRes?.data?.length > 0) {
          let html = `<table><thead><tr><th>学员</th><th>课程</th><th>来源</th><th>状态</th></tr></thead><tbody>`;
          cpRes.data.slice(0, 5).forEach(item => {
            html += `<tr>
              <td>${item.userName || '-'}</td>
              <td>${item.courseName || '-'}</td>
              <td>${item.source || '-'}</td>
              <td><span class="tag ${item.status === 'active' ? 'active' : 'pending'}">${item.status || '-'}</span></td>
            </tr>`;
          });
          html += '</tbody></table>';
          cpTable.innerHTML = html;
        } else {
          cpTable.innerHTML = '<div class="empty">暂无数据，点击上方按钮生成</div>';
        }
        
        // 加载班级成员
        const cmRes = await callFunction('list', 'class_members', { pageSize: 5 });
        const cmTable = document.getElementById('cmTable');
        if (cmRes?.data?.length > 0) {
          let html = `<table><thead><tr><th>学员</th><th>班级</th><th>来源</th><th>状态</th></tr></thead><tbody>`;
          cmRes.data.slice(0, 5).forEach(item => {
            html += `<tr>
              <td>${item.userName || '-'}</td>
              <td>${item.className || '-'}</td>
              <td>${item.source || '-'}</td>
              <td><span class="tag ${item.status === 'enrolled' || item.status === 'learning' ? 'active' : 'pending'}">${item.status || '-'}</span></td>
            </tr>`;
          });
          html += '</tbody></table>';
          cmTable.innerHTML = html;
        } else {
          cmTable.innerHTML = '<div class="empty">暂无数据，点击上方按钮生成</div>';
        }
      } catch (e) {
        log('加载预览失败: ' + e.message, 'error');
      }
    }
    
    // 生成课程权限
    async function generateCoursePermissions() {
      const btn = document.getElementById('btnGenCP');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> 生成中...';
      
      try {
        log('开始生成课程权限测试数据...');
        const res = await callFunction('generateTestData', 'course_permissions', { count: 10 });
        
        if (res && res.code === 0) {
          log(`课程权限生成成功: ${res.data?.inserted || 0} 条`, 'success');
          await refreshStats();
        } else {
          log('生成失败: ' + (res?.message || '未知错误'), 'error');
        }
      } catch (e) {
        log('生成失败: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '生成课程权限测试数据 (10条)';
      }
    }
    
    // 生成班级成员
    async function generateClassMembers() {
      const btn = document.getElementById('btnGenCM');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> 生成中...';
      
      try {
        log('开始生成班级成员测试数据...');
        const res = await callFunction('generateTestData', 'class_members', { count: 10 });
        
        if (res && res.code === 0) {
          log(`班级成员生成成功: ${res.data?.inserted || 0} 条`, 'success');
          await refreshStats();
        } else {
          log('生成失败: ' + (res?.message || '未知错误'), 'error');
        }
      } catch (e) {
        log('生成失败: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '生成班级成员测试数据 (10条)';
      }
    }
    
    // 一键生成全部
    async function generateAll() {
      const btn = document.getElementById('btnGenAll');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> 生成全部...';
      
      try {
        await generateCoursePermissions();
        await new Promise(r => setTimeout(r, 500));
        await generateClassMembers();
        log('全部测试数据生成完成!', 'success');
      } catch (e) {
        log('生成失败: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '一键生成全部测试数据';
      }
    }
    
    // 启动
    window.onload = init;
  </script>
  
  <!-- 微信云开发 SDK -->
  <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloudbase-web.js"></script>
</body>
</html>
