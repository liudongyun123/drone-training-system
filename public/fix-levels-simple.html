<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程等级修复工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      padding: 24px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin-bottom: 8px; }
    .content { padding: 24px; }
    .alert { padding: 16px; border-radius: 8px; margin-bottom: 20px; display: none; }
    .alert.loading { background: #fef3c7; color: #92400e; display: block; }
    .alert.success { background: #d1fae5; color: #065f46; display: block; }
    .alert.error { background: #fee2e2; color: #991b1b; display: block; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 8px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .log { background: #1f2937; color: #10b981; padding: 16px; border-radius: 8px; font-size: 13px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; margin-top: 20px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
    .stat { background: #f3f4f6; padding: 16px; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: bold; color: #4f46e5; }
    .stat-label { font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>🛠️ 课程等级修复工具</h1><p>修复课程的 level 字段</p></div>
    <div class="content">
      <div id="alert" class="alert">初始化中...</div>
      <div class="stats">
        <div class="stat"><div class="stat-value" id="total">-</div><div class="stat-label">总课程</div></div>
        <div class="stat"><div class="stat-value" id="fixed" style="color:#059669">-</div><div class="stat-label">已修复</div></div>
        <div class="stat"><div class="stat-value" id="skipped" style="color:#6b7280">-</div><div class="stat-label">跳过</div></div>
        <div class="stat"><div class="stat-value" id="errors" style="color:#dc2626">-</div><div class="stat-label">失败</div></div>
      </div>
      <div style="text-align:center">
        <button class="btn" id="btnFix" onclick="fixAll()">🔧 一键修复所有课程</button>
        <button class="btn" style="background:#6b7280" onclick="checkData()">🔍 刷新检查</button>
      </div>
      <div id="log" class="log">准备就绪...</div>
    </div>
  </div>
<script>
const API_BASE = 'https://rcwljy-5ghmq2ex26764978.service.tcloudbase.com';
let courses = [], fixed = 0, skipped = 0, errors = 0;
function log(msg) {
  const el = document.getElementById('log');
  el.textContent += '\n' + new Date().toLocaleTimeString() + ' ' + msg;
  el.scrollTop = el.scrollHeight;
}
function setAlert(msg, type) {
  document.getElementById('alert').textContent = msg;
  document.getElementById('alert').className = 'alert ' + type;
}
function updateStats() {
  document.getElementById('total').textContent = courses.length;
  document.getElementById('fixed').textContent = fixed;
  document.getElementById('skipped').textContent = skipped;
  document.getElementById('errors').textContent = errors;
}
async function query(collection, query = {}, limit = 500) {
  try {
    const res = await fetch(API_BASE + '/db-init', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'query', collection, query, limit }) });
    const data = await res.json();
    return data.data || [];
  } catch (e) { log('查询失败: ' + e.message); return []; }
}
async function updateDoc(collection, id, data) {
  try {
    const res = await fetch(API_BASE + '/db-init', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update', collection, id, data }) });
    return await res.json();
  } catch (e) { return { success: false, error: e.message }; }
}
function inferLevel(title) {
  if (!title) return null;
  if (title.includes('视距内驾驶员')) return '视距内驾驶员';
  if (title.includes('超视距驾驶员') || title.includes('机长')) return '超视距驾驶员';
  if (title.includes('教员')) return '教员';
  if (title.includes('初级工')) return '初级工';
  if (title.includes('中级工')) return '中级工';
  if (title.includes('高级工')) return '高级工';
  if (title.includes('技师') && !title.includes('高级技师')) return '技师';
  if (title.includes('高级技师')) return '高级技师';
  return null;
}
async function checkData() {
  setAlert('正在检查数据...', 'loading');
  courses = await query('courses', {}, 500);
  log('找到 ' + courses.length + ' 个课程');
  let withLevel = 0, withoutLevel = 0;
  const levels = {};
  courses.forEach(c => {
    if (c.level) { withLevel++; levels[c.level] = (levels[c.level] || 0) + 1; } else withoutLevel++;
  });
  log('有level: ' + withLevel + ', 无level: ' + withoutLevel);
  updateStats();
  setAlert('检查完成！共 ' + courses.length + ' 个课程，' + withoutLevel + ' 个需要修复', 'success');
}
async function fixAll() {
  if (courses.length === 0) await checkData();
  const btn = document.getElementById('btnFix');
  btn.disabled = true;
  fixed = 0; skipped = 0; errors = 0; updateStats();
  setAlert('正在修复...', 'loading');
  log('开始修复...');
  for (const course of courses) {
    const title = course.title || '';
    const oldLevel = course.level || '';
    const newLevel = inferLevel(title);
    if (!newLevel) { skipped++; continue; }
    if (oldLevel === newLevel) { skipped++; continue; }
    log(title.substring(0, 30) + ': ' + (oldLevel || '(空)') + ' → ' + newLevel);
    const result = await updateDoc('courses', course._id, { level: newLevel, levelText: newLevel, updatedAt: new Date().toISOString() });
    if (result.success || result.code === 0) { fixed++; log('  ✓ 成功'); } else { errors++; log('  ✗ 失败'); }
    updateStats();
    await new Promise(r => setTimeout(r, 30));
  }
  log('完成! 修复:' + fixed + ' 跳过:' + skipped + ' 失败:' + errors);
  setAlert('修复完成！已修复 ' + fixed + ' 个课程', 'success');
  btn.disabled = false;
  await checkData();
}
checkData();
</script>
</body>
</html>
