<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程数据诊断</title>
  <script src="https://cos.branching.fun/tcb.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a2e; color: #eee; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { color: #00d4ff; }
    .section { background: #16213e; padding: 20px; margin: 20px 0; border-radius: 10px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .stat-card { background: #0f3460; padding: 15px; border-radius: 8px; }
    .stat-label { color: #888; font-size: 14px; }
    .stat-value { font-size: 24px; font-weight: bold; color: #00d4ff; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #0f3460; color: #00d4ff; }
    .source-caac { color: #ff6b6b; }
    .source-renshe { color: #4ecdc4; }
    .source-nd { color: #ffe66d; }
    .category-badge { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .cat-multi-rotor { background: #e74c3c; }
    .cat-fixed-wing { background: #3498db; }
    .cat-helicopter { background: #2ecc71; }
    .btn { background: #00d4ff; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 10px 5px 10px 0; }
    .btn:hover { background: #00b8d4; }
    pre { background: #0a0a1a; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 12px; }
    .error { color: #ff6b6b; }
    .success { color: #4ecdc4; }
    .filter-section { background: #0f3460; padding: 15px; border-radius: 8px; margin: 15px 0; }
    select, input { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #333; background: #16213e; color: #fff; }
    .course-item { display: flex; gap: 10px; padding: 10px; border-bottom: 1px solid #333; }
    .course-info { flex: 1; }
    .course-source { font-weight: bold; }
    .course-category { color: #888; }
    .course-level { color: #ffe66d; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
    .source-box { background: #0f3460; padding: 20px; border-radius: 10px; }
    .source-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 课程数据诊断</h1>
    
    <div class="section">
      <h2>数据统计</h2>
      <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-label">加载中...</div></div>
      </div>
    </div>
    
    <div class="section">
      <h2>按体系分组统计</h2>
      <div class="summary-grid" id="summary"></div>
    </div>
    
    <div class="filter-section">
      <h3>筛选条件</h3>
      <select id="filterSource" onchange="renderCourses()">
        <option value="">全部体系</option>
        <option value="CAAC">CAAC 民航局</option>
        <option value="RENSHE">人社部</option>
        <option value="NATIONAL_DEFENSE">国防</option>
      </select>
      <select id="filterCategory" onchange="renderCourses()">
        <option value="">全部类型</option>
        <option value="多旋翼">多旋翼</option>
        <option value="固定翼">固定翼</option>
        <option value="直升机">直升机</option>
      </select>
      <button class="btn" onclick="refresh()">🔄 刷新数据</button>
    </div>
    
    <div class="section">
      <h2>课程列表</h2>
      <div id="courseList"></div>
    </div>
    
    <div class="section">
      <h2>原始数据</h2>
      <pre id="rawData"></pre>
    </div>
  </div>
  
  <script>
    let allCourses = [];
    
    // 初始化 CloudBase
    tcb.init({
      env: 'rcwljy-5ghmq2ex26764978'
    });
    
    async function loadData() {
      try {
        const db = tcb.database();
        
        // 查询所有课程
        const coursesResult = await db.collection('courses').limit(500).get();
        allCourses = coursesResult.data || [];
        
        // 查询所有分类
        const categoriesResult = await db.collection('categories').limit(100).get();
        const categories = categoriesResult.data || [];
        
        // 查询所有体系
        const sourcesResult = await db.collection('sources').limit(100).get();
        const sources = sourcesResult.data || [];
        
        updateStats();
        updateSummary(sources);
        renderCourses();
        
        document.getElementById('rawData').textContent = JSON.stringify({
          courses: allCourses.slice(0, 20),
          categories: categories,
          sources: sources
        }, null, 2);
        
      } catch (err) {
        console.error('加载失败:', err);
        document.getElementById('stats').innerHTML = `<div class="error">加载失败: ${err.message}</div>`;
      }
    }
    
    function updateStats() {
      const caac = allCourses.filter(c => c.sourceId === 'CAAC').length;
      const renshe = allCourses.filter(c => c.sourceId === 'RENSHE').length;
      const nd = allCourses.filter(c => c.sourceId === 'NATIONAL_DEFENSE').length;
      
      const multiRotor = allCourses.filter(c => c.categoryId === 'multi-rotor' || c.category === '多旋翼').length;
      const fixedWing = allCourses.filter(c => c.categoryId === 'fixed-wing' || c.category === '固定翼').length;
      const helicopter = allCourses.filter(c => c.categoryId === 'helicopter' || c.category === '直升机').length;
      
      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">总课程数</div>
          <div class="stat-value">${allCourses.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">CAAC 民航局</div>
          <div class="stat-value source-caac">${caac}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">RENSHE 人社部</div>
          <div class="stat-value source-renshe">${renshe}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">NATIONAL_DEFENSE 国防</div>
          <div class="stat-value source-nd">${nd}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">多旋翼</div>
          <div class="stat-value">${multiRotor}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">固定翼</div>
          <div class="stat-value">${fixedWing}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">直升机</div>
          <div class="stat-value">${helicopter}</div>
        </div>
      `;
    }
    
    function updateSummary(sources) {
      const caacCourses = allCourses.filter(c => c.sourceId === 'CAAC');
      const rensheCourses = allCourses.filter(c => c.sourceId === 'RENSHE');
      
      const caacCategories = [...new Set(caacCourses.map(c => c.categoryId || c.category))];
      const rensheCategories = [...new Set(rensheCourses.map(c => c.categoryId || c.category))];
      
      let html = '';
      
      // CAAC 统计
      html += `
        <div class="source-box">
          <div class="source-title source-caac">CAAC 民航局 (${caacCourses.length})</div>
          <div style="color: #888; margin-bottom: 10px;">分类: ${caacCategories.join(', ') || '无'}</div>
          <div style="font-size: 12px;">
            ${caacCourses.slice(0, 5).map(c => `
              <div style="padding: 5px; background: #16213e; margin: 5px 0; border-radius: 4px;">
                <div style="color: #fff;">${c.title}</div>
                <div style="color: #888; font-size: 11px;">
                  categoryId: ${c.categoryId || '无'} | category: ${c.category || '无'}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      
      // RENSHE 统计
      html += `
        <div class="source-box">
          <div class="source-title source-renshe">RENSHE 人社部 (${rensheCourses.length})</div>
          <div style="color: #888; margin-bottom: 10px;">分类: ${rensheCategories.join(', ') || '无'}</div>
          <div style="font-size: 12px;">
            ${rensheCourses.slice(0, 5).map(c => `
              <div style="padding: 5px; background: #16213e; margin: 5px 0; border-radius: 4px;">
                <div style="color: #fff;">${c.title}</div>
                <div style="color: #888; font-size: 11px;">
                  categoryId: ${c.categoryId || '无'} | category: ${c.category || '无'}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      
      // 其他体系
      const otherCourses = allCourses.filter(c => 
        c.sourceId !== 'CAAC' && c.sourceId !== 'RENSHE'
      );
      html += `
        <div class="source-box">
          <div class="source-title source-nd">其他体系 (${otherCourses.length})</div>
          <div style="color: #888; margin-bottom: 10px;">
            sourceIds: ${[...new Set(otherCourses.map(c => c.sourceId))].join(', ') || '无'}
          </div>
          <div style="font-size: 12px;">
            ${otherCourses.slice(0, 5).map(c => `
              <div style="padding: 5px; background: #16213e; margin: 5px 0; border-radius: 4px;">
                <div style="color: #fff;">${c.title}</div>
                <div style="color: #888; font-size: 11px;">
                  sourceId: ${c.sourceId} | categoryId: ${c.categoryId || '无'}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      
      document.getElementById('summary').innerHTML = html;
    }
    
    function renderCourses() {
      const filterSource = document.getElementById('filterSource').value;
      const filterCategory = document.getElementById('filterCategory').value;
      
      let filtered = allCourses;
      if (filterSource) {
        filtered = filtered.filter(c => c.sourceId === filterSource);
      }
      if (filterCategory) {
        filtered = filtered.filter(c => 
          c.categoryId === filterCategory || c.category === filterCategory
        );
      }
      
      document.getElementById('courseList').innerHTML = filtered.map(c => `
        <div class="course-item">
          <div class="course-info">
            <div class="course-source ${c.sourceId === 'CAAC' ? 'source-caac' : c.sourceId === 'RENSHE' ? 'source-renshe' : 'source-nd'}">
              [${c.sourceId || '未知'}]
            </div>
            <div style="color: #fff;">${c.title}</div>
            <div class="course-category">
              categoryId: <span style="color: ${getCategoryColor(c.categoryId)}">${c.categoryId || '❌ 无'}</span> | 
              category: <span style="color: ${getCategoryColor(c.category)}">${c.category || '无'}</span>
            </div>
            <div class="course-level">level: ${c.levelText || c.level || '无'}</div>
          </div>
        </div>
      `).join('');
    }
    
    function getCategoryColor(cat) {
      if (cat === '多旋翼' || cat === 'multi-rotor') return '#e74c3c';
      if (cat === '固定翼' || cat === 'fixed-wing') return '#3498db';
      if (cat === '直升机' || cat === 'helicopter') return '#2ecc71';
      return '#888';
    }
    
    function refresh() {
      loadData();
    }
    
    loadData();
  </script>
</body>
</html>
